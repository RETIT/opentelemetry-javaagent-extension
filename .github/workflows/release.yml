name: Releases

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*-*'

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - name: Set version from tag
        run: mvn -B versions:set -DnewVersion=${GITHUB_REF_NAME} -DgenerateBackupPoms=false
      - name: Compile and run Checkstyle, PMD and Spotbugs checks
        run: mvn -B checkstyle:check pmd:check compile spotbugs:check --file pom.xml
      - name: Package Extension and create Docker Container for Sample Application
        run: mvn -B package --file pom.xml
      - name: Run Integration Test
        run: mvn -B test -Dtest=JDK8JavaAgentExtensionIT,JDK21JavaAgentExtensionIT,SpringWithExternalOtelAgentAndExtensionIT,QuarkusWithExternalOtelAgentAndExtensionIT --file ./extension/pom.xml
      - name: Publish to GitHub Packages
        run: mvn -B deploy -DskipTests --file pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
      - name: Create Release and Upload Artifact
        uses: ncipollo/release-action@v1
        with:
          artifacts: "extension/target/io.retit.opentelemetry.javaagent.extension.jar,cdi-library/target/opentelemetry-java-agent-extension-cdi-library-*.jar"
