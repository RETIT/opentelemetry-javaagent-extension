quarkus.http.port=8080
quarkus.package.jar.type=uber-jar
quarkus.package.jar.add-runner-suffix=false
quarkus.application.name=quarkus-library-app
# --------------------------------------------------------------------------
# OpenTelemetry – handled entirely by quarkus-opentelemetry (no Java-agent)
# --------------------------------------------------------------------------
# Send traces / metrics to an OTLP collector.  Override via environment variable
# QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT at runtime.
quarkus.otel.exporter.otlp.endpoint=http://otelcol:4317
quarkus.otel.metrics.enabled=true
quarkus.otel.logs.enabled=false
# --------------------------------------------------------------------------
# RETIT library configuration – same properties as the agent-based setup.
# Override with environment variables, e.g.:
#   IO_RETIT_EMISSIONS_CLOUD_PROVIDER=AWS
#   IO_RETIT_EMISSIONS_CLOUD_PROVIDER_REGION=eu-central-1
#   IO_RETIT_EMISSIONS_CLOUD_PROVIDER_INSTANCE_TYPE=m5.large
# --------------------------------------------------------------------------
