quarkus.http.port=8080
quarkus.package.jar.type=uber-jar

quarkus.package.jar.add-runner-suffix=false

quarkus.container-image.build=true
quarkus.jib.base-jvm-image=mirror.gcr.io/library/eclipse-temurin:21-jre
quarkus.container-image.image=quarkus-rest-service:feature

# host.docker.internal is intentionally used here as the default endpoint for local development
# with Docker Desktop (Windows/macOS), where it routes to the OTel Collector running on the host.
# When running via docker-compose (see examples/docker/docker-compose.yml) or on Linux without
# Docker Desktop, override this with the collector service name, e.g.:
#   QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=http://otelcol:4317
quarkus.otel.exporter.otlp.endpoint=http://host.docker.internal:4317
quarkus.application.name=quarkus-app
quarkus.otel.metrics.enabled=true
quarkus.otel.logs.enabled=false